name: Build & Publish rapchiktech Repo

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Make gradlew executable
        run: chmod +x gradlew || true

      - name: Build MkvDrama
        run: gradle :MkvDrama:make --stacktrace

      - name: Build KatMovieHD
        run: gradle :KatMovieHD:make --stacktrace

      - name: Collect cs3 files
        run: |
          mkdir -p builds
          find . -name "*.cs3" -not -path "./builds/*" -exec cp {} builds/ \;
          ls -la builds/

      - name: Generate plugins.json and repo.json
        run: |
          REPO="${{ github.repository }}"
          RAW="https://raw.githubusercontent.com/${REPO}/builds"
          cat > builds/plugins.json << 'EOF'
          [
            {
              "url": "PLACEHOLDER_MKV",
              "name": "MkvDrama",
              "internalName": "MkvDrama",
              "authors": ["rapchiktech"],
              "description": "Asian dramas and movies from MkvDrama.net",
              "language": "en",
              "tvTypes": ["AsianDrama", "Movie"],
              "version": 1,
              "apiVersion": 2,
              "status": 1
            },
            {
              "url": "PLACEHOLDER_KAT",
              "name": "KatMovieHD",
              "internalName": "KatMovieHD",
              "authors": ["rapchiktech"],
              "description": "Movies and shows from KatMovieHD",
              "language": "hi",
              "tvTypes": ["Movie", "TvSeries", "AsianDrama", "Anime"],
              "version": 1,
              "apiVersion": 2,
              "status": 1
            }
          ]
          EOF
          sed -i "s|PLACEHOLDER_MKV|${RAW}/MkvDrama.cs3|g" builds/plugins.json
          sed -i "s|PLACEHOLDER_KAT|${RAW}/KatMovieHD.cs3|g" builds/plugins.json
          echo "{\"name\":\"rapchiktech\",\"description\":\"MkvDrama + KatMovieHD by rapchiktech\",\"manifestVersion\":2,\"pluginLists\":[\"${RAW}/plugins.json\"]}" > builds/repo.json

      - name: Deploy to builds branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: builds
          publish_dir: ./builds
          force_orphan: true
          commit_message: "build #${{ github.run_number }}"
