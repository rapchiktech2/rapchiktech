name: Build & Publish rapchiktech Repo

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build MkvDrama plugin
        run: ./gradlew MkvDrama:make

      - name: Build KatMovieHD plugin
        run: ./gradlew KatMovieHD:make

      - name: Collect all .cs3 files
        run: |
          mkdir -p builds
          find . -name "*.cs3" -not -path "./builds/*" -exec cp {} builds/ \;

      - name: Generate plugins.json
        run: |
          REPO="${{ github.repository }}"
          RAW="https://raw.githubusercontent.com/${REPO}/builds"
          echo "[" > builds/plugins.json
          FIRST=true
          for cs3 in builds/*.cs3; do
            FILE=$(basename "$cs3")
            NAME="${FILE%.cs3}"
            [ "$FIRST" = true ] && FIRST=false || echo "," >> builds/plugins.json
            if [ "$NAME" = "MkvDrama" ]; then
              LANG="en"; TYPES='["AsianDrama","Movie"]'
              DESC="Asian dramas and movies from MkvDrama.net"
              ICON="https://mkvdrama.net/favicon.ico"
            else
              LANG="hi"; TYPES='["Movie","TvSeries","AsianDrama","Anime"]'
              DESC="Hollywood, K-Drama, Anime, Netflix, Disney+ from KatMovieHD"
              ICON="https://new.katmoviehd.cymru/favicon.ico"
            fi
            cat >> builds/plugins.json << ENDJSON
          {
            "url": "${RAW}/${FILE}",
            "name": "${NAME}",
            "internalName": "${NAME}",
            "authors": ["rapchiktech"],
            "description": "${DESC}",
            "repositoryUrl": "https://github.com/${REPO}",
            "language": "${LANG}",
            "tvTypes": ${TYPES},
            "iconUrl": "${ICON}",
            "version": 1,
            "apiVersion": 2,
            "status": 1
          }
          ENDJSON
          done
          echo "]" >> builds/plugins.json

      - name: Generate repo.json
        run: |
          REPO="${{ github.repository }}"
          RAW="https://raw.githubusercontent.com/${REPO}/builds"
          cat > builds/repo.json << EOF
          {
            "name": "rapchiktech",
            "description": "MkvDrama + KatMovieHD by rapchiktech",
            "manifestVersion": 2,
            "pluginLists": ["${RAW}/plugins.json"]
          }
          EOF

      - name: Deploy to builds branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: builds
          publish_dir: ./builds
          force_orphan: true
          commit_message: "rapchiktech build #${{ github.run_number }}"
